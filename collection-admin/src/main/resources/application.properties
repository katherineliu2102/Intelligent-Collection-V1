server.port=8080
spring.application.name=collection-admin

# ── 数据源（Phase 1 新测试库；可用环境变量覆盖） ──
spring.datasource.url=jdbc:mysql://${DB_HOST:34.124.218.94}:${DB_PORT:3306}/${DB_NAME:ai_collection_db}?serverTimezone=Asia/Manila&useUnicode=true&characterEncoding=utf-8&useSSL=false&allowPublicKeyRetrieval=true
spring.datasource.username=${DB_USER:ai_collection}
# 密码含 $ 时：① 默认值里 $ 必须写成 $$（Spring 占位符转义）② 或用环境变量 export DB_PASSWORD='AiCS@1573$'
spring.datasource.password=${DB_PASSWORD:AiCS@1573$$}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ── MyBatis：下划线转驼峰，枚举默认按 name() 存取，null 绑定为 NULL（避免 MySQL 驱动报 OTHER 类型） ──
mybatis.configuration.map-underscore-to-camel-case=true
mybatis.configuration.default-enum-type-handler=org.apache.ibatis.type.EnumTypeHandler
mybatis.configuration.jdbc-type-for-null=NULL

# ── 基础设施实现选择（Phase 1 链路验证：内存版，无需 Redis） ──
collection.eventbus=memory
collection.idempotency=memory

# ── 调度（Trigger-to-Event 占位；生产改 XXL-Job）：扫描间隔（毫秒） ──
collection.scan.interval-ms=5000

# ── 引擎参数（对应基础设施规范 附录；生产应迁至 t_system_property + 热更） ──
engine.step.idempotency-ttl-minutes=15
engine.step.max-retry-count=3
engine.step.retry-base-interval-seconds=30
engine.step.retry-max-interval-seconds=300
engine.step.retry-backoff-factor=2
engine.step.callback-timeout-minutes=60
engine.plan.max-rebuild-count=2
engine.consumer.thread-pool-size=8
engine.consumer.queue-capacity=256
engine.consumer.scan-limit=1000
engine.context.history-max-records=50

logging.level.com.collection=info
