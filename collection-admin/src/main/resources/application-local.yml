server:
  port: 8888
spring:
  application:
    name: intelligent-collection-local
  cloud:
    nacos:
      config:
        username: ${NACOS_USERNAME}
        password: ${NACOS_PASSWORD}
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      data-source-properties:
        allowPublicKeyRetrieval: "true"
        useSSL: "false"
mybatis:
  configuration:
    map-underscore-to-camel-case: true
    default-enum-type-handler: org.apache.ibatis.type.EnumTypeHandler
    jdbc-type-for-null: "NULL"
collection:
  scan:
    interval-ms: 5000
  idempotency: memory
  eventbus: memory
  # 数据接入 B1（PubSub 消费）。enabled 默认 false → 本地/CI 不启动消费、不依赖 GCP；
  # L4b 联调由 Nacos 覆盖 enabled=true（连接信息走环境变量，不入仓）。
  ingestion:
    enabled: ${INGESTION_ENABLED:false}
    project-id: ${GCP_PUBSUB_PROJECT:}
    subscription: ${GCP_PUBSUB_SUBSCRIPTION:collection-cases-ai-v1-sub}
    ack-deadline-seconds: 60
    max-concurrency: 4
    # loan-id-whitelist: [99000001, 99000002]   # 联调白名单（缩小影响面，不入仓）
