server:
  port: 8888
spring:
  application:
    name: intelligent-collection-local
  cloud:
    nacos:
      config:
        username: ${NACOS_USERNAME}
        password: ${NACOS_PASSWORD}
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
mybatis:
  configuration:
    map-underscore-to-camel-case: true
    default-enum-type-handler: org.apache.ibatis.type.EnumTypeHandler
    jdbc-type-for-null: "NULL"
collection:
  scan:
    interval-ms: 5000
  idempotency: memory
  eventbus: memory
channel:
  callback:
    base-url: http://localhost:8888/webhook
  notification:
    base-url: https://notification.mocasa.com   # 生产通知中心（真 key 须配此地址；测试服 collection 仅 Virtual）
    app-code: mocasa
    app-key: ${NOTIFICATION_APP_KEY:}
    sms-content-type: collection
    sms-test-mode: false  # 真号生产：走 /v1/sms/send（签名，内部路由 QH/Hiway/BORI）；改 true 走 testSend Virtual 免签名
    push-sync-mode: true  # 联调：走 /v1/app_notification/sync/send（可见极光受理结果）；注意 Push 无免签名端点，仍需 app-key
    push-test-token: ${NOTIFICATION_PUSH_TEST_TOKEN:1a0018970bf0c19de04}  # 测试 app 隔离：所有 push 强制投此 token，绝不触达真实用户；生产置空
  debug:
    legacy-three-step: false
    single-step: SMS
  scripts:
    push-default-deep-link: https://app.mocasa.com/repay
    # ⚠ Phase 1 占位文案：仅为让各 stage 差异立即可见，非正式催收话术（待编排同事提供正式版）。
    sms:
      # S0（到期前/当日，SMS 与 PUSH 共用同槽，无渠道后缀）
      S0_REMINDER: "[S0] MOCASA: {name}, your payment of PHP {amount} is due soon. Pay in the app."
      S0_REMINDER_URGENT: "[S0-URGENT] MOCASA: {name}, your PHP {amount} is due tomorrow. Please prepare payment."
      S0_DUE_TODAY: "[S0-DUE] MOCASA: {name}, your PHP {amount} is due today. Settle in the app to avoid penalties."
      # S1 standard
      S1_SMS_STANDARD: "[S1] MOCASA: {name}, your account is {dpd} day(s) overdue. Settle PHP {amount} in the app."
      # S2 standard + firm
      S2_SMS_STANDARD: "[S2] MOCASA: {name}, {dpd} days overdue. Please pay PHP {amount} now to avoid escalation."
      S2_SMS_FIRM: "[S2-FIRM] MOCASA: {name}, you are {dpd} days overdue. Pay PHP {amount} immediately."
      # S3 standard + firm
      S3_SMS_STANDARD: "[S3] MOCASA: {name}, {dpd} days overdue. Outstanding PHP {amount}. Settle urgently."
      S3_SMS_FIRM: "[S3-FIRM] MOCASA: {name}, {dpd} days overdue. PHP {amount} must be paid now to avoid further action."
      # S4 standard + firm
      S4_SMS_STANDARD: "[S4] MOCASA: {name}, {dpd} days overdue. Final notice for PHP {amount}. Pay immediately."
      S4_SMS_FIRM: "[S4-FIRM] MOCASA: {name}, {dpd} days overdue. PHP {amount} overdue. Account at risk of closure."
    push:
      # S0（共用槽）
      S0_REMINDER:
        title: "[S0] Payment due soon"
        body: "{name}, PHP {amount} is due soon. Tap to pay in the app."
      S0_REMINDER_URGENT:
        title: "[S0] Due tomorrow"
        body: "{name}, your PHP {amount} is due tomorrow. Tap to settle."
      S0_DUE_TODAY:
        title: "[S0] Due today"
        body: "{name}, PHP {amount} is due today. Tap to pay now."
      S1_PUSH_STANDARD:
        title: "[S1] Overdue: PHP {amount}"
        body: "{name}, your payment is {dpd} day(s) past due. Tap to settle."
      S2_PUSH_STANDARD:
        title: "[S2] {dpd} days overdue"
        body: "{name}, pay PHP {amount} now to avoid escalation."
      S3_PUSH_STANDARD:
        title: "[S3] {dpd} days overdue"
        body: "{name}, outstanding PHP {amount}. Settle urgently."
      S4_PUSH_STANDARD:
        title: "[S4] Final notice"
        body: "{name}, {dpd} days overdue. Pay PHP {amount} immediately."
  sendgrid:
    api-key: ${SENDGRID_API_KEY:}
    from-email: ${SENDGRID_FROM_EMAIL:collections@mocasa.com}
    from-name: MOCASA Collections
    # Phase 1 仅 5 个里程碑 Email（见 docs/email-templates/subjects.md）
    templates:
      S0_DUE_TODAY_EMAIL: d-9b485bfd24e14950a7811faf33c2b22f
      S1_EMAIL_OVERDUE_NOTICE: d-bc7f5aee7e304caf93ca4d435a73a1d7
      S2_EMAIL_ENTRY: d-86ed8faae3b24489ad7db8a11067b8c4
      S4_EMAIL_ENTRY: d-658d5be184ab4710a19c8419ed66bca9
      S4_EMAIL_PRE_CLOSE: d-881ce23667cc4df2abf82097b890cae1
    unsubscribe-group-id: 0
logging:
  level:
    root: INFO
    com.collection: DEBUG
    org.mybatis: INFO
    org.springframework.web: INFO
