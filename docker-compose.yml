services:
  collection-admin:
    build:
      context: .
      dockerfile: Dockerfile
    image: intelligent-collection-admin:latest
    container_name: collection-admin
    ports:
      - "${APP_PORT:-8080}:8080"
    env_file:
      - path: "${APP_ENV_FILE:-.env}"
        required: false
    restart: unless-stopped
    volumes:
      - ./logs:/opt/app/logs
