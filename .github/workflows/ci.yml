name: CI

on:
  push:
    branches: [ main, ca_branch ]
  pull_request:
    branches: [ main ]

jobs:
  build-test:
    name: Build & Unit Test (JDK 8)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # Spotless 的 ratchetFrom origin/main 需要完整历史与 main 引用
          fetch-depth: 0

      - name: Set up JDK 8
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '8'
          cache: maven

      - name: Ensure origin/main ref (for Spotless ratchet)
        run: git fetch --no-tags origin +refs/heads/main:refs/remotes/origin/main || true

      # Commit message 门禁：复用 .githooks/commit-msg 逻辑，校验 PR 里每条提交信息。
      # 本地钩子可被 --no-verify 绕过，这里是真闸。仅 pull_request 事件执行。
      - name: Check commit messages (Angular convention)
        if: github.event_name == 'pull_request'
        run: |
          PATTERN='^(feat|fix|docs|style|refactor|perf|test|build|ci|chore)(\([a-z0-9._-]+\))?!?: .+'
          FAIL=0
          while IFS= read -r msg; do
            case "$msg" in "Merge "*|"Revert "*) continue ;; esac
            if ! printf '%s' "$msg" | grep -Eq "$PATTERN"; then
              echo "✗ 不符合 Angular 规范: $msg"
              FAIL=1
            fi
          done < <(git log --format=%s origin/main..HEAD)
          [ $FAIL -eq 0 ] || exit 1

      # 格式门禁：只校验相对 main 改动过的文件，不达标即失败（本地钩子可被 --no-verify 绕过，这里是真闸）
      - name: Check formatting (Spotless, incremental vs main)
        run: mvn -B -ntp spotless:check

      # Phase 1 纯逻辑单测不连库（mock SPI/Repository/EventBus），无需 MySQL/Redis。
      - name: Build & run unit tests
        run: mvn -B -ntp clean test
